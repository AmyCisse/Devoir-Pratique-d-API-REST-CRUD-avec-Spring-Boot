spring:
  datasource:
    url: jdbc:mysql://localhost:3306/isepat_dev?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# JWT settings for development
jwt:
  # Secret must be at least 32 bytes for HS256 (keep private in real projects)
  secret: my-very-secret-key-which-is-very-long-123456
  # Expiration time in milliseconds (e.g., 3600000 = 1 hour)
  expiration: 3600000
